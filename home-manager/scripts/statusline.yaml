# Claude Code statusline configuration
# Location: ~/.claude/statusline.yaml (symlinked from nix-config)

box: true
direction: ltr   # ltr or rtl

sparkles:
  enabled: true
  density: 8          # 1 sparkle per N padding columns
  chars: ["✦", "✧", "⋆", "·"]
  colors: [yellow, white, cyan, magenta]

icons:
  session:   "🧵"
  model:     "🧠"
  cost:      "💸"
  duration:  "⏱"
  context:   "📊"
  directory: "📂"
  branch:    "🌿"

# Line order — built-in types: session, starship, stats
# Custom widgets: dict with icon, color, and one of:
#   command: "shell command"        → first line of stdout
#   text: "static string"           → literal text
#   field: "cost.total_lines_added" → value from Claude Code JSON data
#
# Examples (uncomment to enable):
#   - icon: "🗓"
#     command: "date '+%a %b %d %H:%M'"
#     color: bright_white
#   - icon: "📍"
#     field: workspace.project_dir
#     color: bright_cyan
#   - icon: "💬"
#     text: "My custom note"
#     color: bright_magenta
lines:
  - session
  - starship
  - stats

colors:
  session_name: bright_blue
  session_id:   orange
  model:        bright_blue
  cost:         bright_green
  duration:     bright_cyan
  context:      bright_yellow
  directory:    bright_cyan
  branch:       bright_magenta
