# Claude Code statusline configuration
# Location: ~/.claude/statusline.yaml (symlinked from nix-config)

box: true
direction: ltr   # ltr or rtl

sparkles:
  enabled: true
  density: 8          # 1 sparkle per N padding columns
  chars: ["✦", "✧", "⋆", "·"]
  colors: [yellow, white, cyan, magenta]

icons:
  session:   "🧵"
  model:     "🧠"
  cost:      "💸"
  duration:  "⏱"
  context:   "📊"
  directory: "📂"
  branch:    "🌿"

# Line order — available types: session, starship, stats
lines:
  - session
  - starship
  - stats

colors:
  session_name: bright_blue
  session_id:   orange
  model:        bright_blue
  cost:         bright_green
  duration:     bright_cyan
  context:      bright_yellow
  directory:    bright_cyan
  branch:       bright_magenta
