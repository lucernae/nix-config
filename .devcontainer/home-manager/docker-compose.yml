version: '3'
services:
  # Update this to the name of the service you want to work with in your docker-compose.yml file
  devcontainer:
    # If you want add a non-root user to your Dockerfile, you can use the "remoteUser"
    # property in devcontainer.json to cause VS Code its sub-processes (terminals, tasks,
    # debugging) to execute as the user. Uncomment the next line if you want the entire
    # container to run as this user instead. Note that, on Linux, you may need to
    # ensure the UID and GID of the container user you create matches your local user.
    # See https://aka.ms/vscode-remote/containers/non-root for details.
    #
    # user: vscode

    # Uncomment if you want to override the service's Dockerfile to one in the .devcontainer
    # folder. Note that the path of the Dockerfile and context is relative to the *primary*
    # docker-compose.yml file (the first in the devcontainer.json "dockerComposeFile"
    # array). The sample below assumes your primary file is in the root of your project.
    #
    # image: ghcr.io/lucernae/devcontainer-nix:v1
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    # Explicit capabilities required by Tailscale kernel TUN mode (also covered by privileged,
    # but listed here so they survive if privileged is ever narrowed):
    #   NET_ADMIN — configure network interfaces and routing (create tailscale0)
    #   NET_RAW   — send ICMP packets through the Tailscale tunnel
    #   MKNOD     — create /dev/net/tun device node inside the container if absent
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - MKNOD
    volumes:
      # Update this to wherever you want VS Code to mount the folder of your project
      - ../../../:/workspaces:cached

      # Use Docker from inside the container. See https://aka.ms/vscode-remote/samples/docker-from-docker-compose for details.
      - /var/run/docker.sock:/var/run/docker.sock

      # Persist Tailscale daemon state across devcontainer rebuilds so re-authentication is not needed.
      # Mirrors the mount used by the official Tailscale Codespace feature.
      - tailscale-state:/var/lib/tailscale

    hostname: devcontainer

    environment:
      NIX_MULTI_USER: "true"
      NIX_REMOTE: "daemon"
      VSCODE_SERVER_CUSTOM_GLIBC_LINKER: "true"
      # Enable GPG agent forwarding over Tailscale (set to "true" to enable)
      ENABLE_GPG_FORWARD: "${ENABLE_GPG_FORWARD:-false}"

    # For ptrace-based debuggers (C++, Go, Rust): add SYS_PTRACE to cap_add above
    # and uncomment the security_opt below.
    # security_opt:
    #   - seccomp:unconfined

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

volumes:
  tailscale-state:
